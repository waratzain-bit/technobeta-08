<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AuraFeed Newsroom - Technobeta</title>
    
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#10b981" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AuraFeed" />
    <link rel="apple-touch-icon" href="/icon-512.png" />
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Permanent+Marker&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        min-height: 100%;
        background-color: #000000;
        overflow-y: auto;
      }
      body {
        font-family: 'Roboto', sans-serif;
      }
      .font-caveat { font-family: 'Caveat', cursive; }
      .font-permanent-marker { font-family: 'Permanent Marker', cursive; }
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>

    <script type="importmap">
    {
      "imports": {
        "@google/genai": "https://esm.sh/@google/genai@^1.14.0",
        "react-dom/": "https://esm.sh/react-dom@^19.1.1/",
        "react/": "https://esm.sh/react@^19.1.1/",
        "react": "https://esm.sh/react@^19.1.1",
        "tailwind-merge": "https://esm.sh/tailwind-merge@^3.3.1",
        "framer-motion": "https://esm.sh/framer-motion@^12.23.12",
        "clsx": "https://esm.sh/clsx@^2.1.1"
      }
    }
    </script>
    
    <link rel="stylesheet" href="/index.css">
  </head>
  
  <body>
    <div id="root"></div>

    <script type="module" src="/index.tsx"></script>
    
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js")
            .then((registration) => {
              console.log("PWA Service Worker registered successfully:", registration.scope);
            })
            .catch((error) => {
              console.error("PWA Service Worker registration failed:", error);
            });
        });
      }
    </script>
  </body>
</html>
